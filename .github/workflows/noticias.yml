name: scraper-noticias

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT (UTC-3)
    - cron: '0 18 * * *'   # 15:00 BRT (UTC-3)
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependências
        run: pip install requests google-genai gspread google-auth
      - name: Rodar scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID_TSE: ${{ secrets.SPREADSHEET_ID_TSE }}
        run: python scraper_noticias.py
