name: pesqele-daily

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Dias para trás (backfill: use um número maior, ex.: 20)"
        default: "7"
        required: false
  schedule:
    - cron: '7 10 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      HEADLESS: "1"
      ELEICAO_TEXT: "Eleições Gerais 2026"
      ADD_HOURS: "3"
      TZ: "America/Recife"
      DAYS_BACK: ${{ github.event.inputs.days_back || '5' }}
      PESQELE_DEBUG_DIR: pesqele-debug
      PESQELE_PAGELOAD_TIMEOUT: "45"
      PESQELE_PAGE_LOAD_STRATEGY: "eager"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Export Chrome
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Remover chromedriver incompatível do runner
        run: |
          sudo rm -f /usr/bin/chromedriver
          which chromedriver || true

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python - << 'PY'
          import os, json
          raw = os.environ.get("GOOGLE_CREDENTIALS_JSON", "")
          if not raw.strip():
            raise SystemExit("Secret GOOGLE_CREDENTIALS_JSON está vazio.")
          data = json.loads(raw)
          with open("credentials.json", "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False)
          print("credentials.json escrito.")
          PY

      - name: Run scraper
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          python scraper_pesqele.py

      - name: Upload diagnóstico PesqEle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pesqele-debug
          path: pesqele-debug/
          if-no-files-found: ignore
