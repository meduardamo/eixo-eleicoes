name: 10 - TSE

on:
  schedule:
    # O DivulgaCand diz atualizar de hora em hora, então acompanhamos no mesmo
    # ritmo. A coleta é só API, sem Gemini: 28 UEs por cargo, resposta em
    # milissegundos, custo zero. Minuto fora do :00 porque é quando o Actions
    # mais enfileira as rodadas agendadas.
    - cron: '25 * * * *'
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install gspread requests pandas

      - name: Escrever credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - run: python -m outros.tse_candidaturas
        env:
          SPREADSHEET_ID_TSE: ${{ secrets.SPREADSHEET_ID_TSE }}
