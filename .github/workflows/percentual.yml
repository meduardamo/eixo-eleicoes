name: percentual 

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions roda em UTC.
    # Horários em Brasília (UTC-3): 08:53, 15:17 e 20:42.
    - cron: "53 11 * * *"
    - cron: "17 18 * * *"
    - cron: "42 23 * * *"
  workflow_run:
    workflows:
      - eixo eleições
    types:
      - completed

jobs:
  corrigir-percentual:
    name: Corrigir Percentual na Planilha
    if: ${{ github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Preparar credenciais Google
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "Secret GOOGLE_CREDENTIALS_JSON não configurado no repositório."
            exit 1
          fi
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json
          python -c "import json; json.load(open('credentials.json', encoding='utf-8')); print('credentials.json válido')"

      - name: Executar script de correção
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID_POLLINGDATA }}
          NOME_ABA: resultados
          NOME_COLUNA: percentual
          FORCAR_LOCALE: "1"
          LOCALE_PLANILHA: en_US
        run: python corrigir_percentual_planilha.py
