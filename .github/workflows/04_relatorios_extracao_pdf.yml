name: 04 - Extrai PDF (segmentos)

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Brasil/Recife = UTC-3. Duas rodadas após as
    # coletas de 07h e 13h, com janela para conferir os links.
    - cron: '43 12 * * *'  # 09:43 Brasil
    - cron: '43 18 * * *'  # 15:43 Brasil

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TZ: "America/Recife"
      PYTHONUNBUFFERED: "1"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico da rodada
        run: |
          date
          python --version
          echo "Workflow: relatorios-extracao-segmentos"
          echo "Comando: relatorios_extracao_segmentos.py extrair"
          echo "Topline foi aposentado (16/07/2026) - cadastro manual via Polling Manual"

      - name: Extrair segmentos, rejeição e aprovação
        run: python -u -m relatorios.relatorios_extracao_segmentos extrair
