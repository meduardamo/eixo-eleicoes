name: 04 - Extrai PDF

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Brasil/Recife = UTC-3.
    # Executa de manhã, depois da busca noturna e da conferência dos links.
    - cron: '0 23 * * *'   # 07:30 Brasil

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 215

    env:
      TZ: "America/Recife"
      PYTHONUNBUFFERED: "1"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico da rodada
        run: |
          date
          python --version
          echo "Workflow: polling-pdf-extrair-topline"
          echo "Comandos: relatorios_pipeline.py extrair; relatorios_pipeline.py topline"
          echo "Publicação PollingData: DESATIVADA"

      - name: Extrair segmentos, rejeição e aprovação
        id: extrair
        continue-on-error: true
        timeout-minutes: 100
        run: |
          set +e
          echo "::group::python relatorios_pipeline.py extrair"
          python -u relatorios_pipeline.py extrair
          status=$?
          echo "::endgroup::"
          exit "$status"

      - name: Extrair topline
        id: topline
        continue-on-error: true
        timeout-minutes: 100
        run: |
          set +e
          echo "::group::python relatorios_pipeline.py topline"
          python -u relatorios_pipeline.py topline
          status=$?
          echo "::endgroup::"
          exit "$status"

      - name: Resultado final
        if: ${{ always() }}
        run: |
          echo "extrair: ${{ steps.extrair.outcome }}"
          echo "topline: ${{ steps.topline.outcome }}"
          if [ "${{ steps.extrair.outcome }}" != "success" ] || [ "${{ steps.topline.outcome }}" != "success" ]; then
            exit 1
          fi
