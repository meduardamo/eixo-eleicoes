name: 05 - Rebuild BI

on:
  schedule:
    # GitHub Actions usa UTC; Brasil/Recife = UTC-3. De 4 em 4 horas, minuto
    # fora do :00 porque o :00 é quando o GitHub Actions mais enfileira e
    # atrasa a rodada agendada. Reconstrói o resultados_bi do PollingData
    # (o salvamento manual não faz mais isso na hora).
    - cron: '25 */4 * * *'  # a cada 4h (…, 21:25, 01:25, 05:25 BRT …)
  workflow_dispatch:         # permite rodar manualmente pelo GitHub

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: "America/Recife"
      PYTHONUNBUFFERED: "1"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      SPREADSHEET_ID_POLLINGDATA: ${{ secrets.SPREADSHEET_ID_POLLINGDATA }}
      SPREADSHEET_ID_POLLINGDATA_T2: ${{ secrets.SPREADSHEET_ID_POLLINGDATA_T2 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reconstruir resultados_bi
        run: python -u -m relatorios.relatorios_extracao_segmentos rebuild_bi
