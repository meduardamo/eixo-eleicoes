name: polling-pdf-extrair-topline

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Recife = UTC-3.
    - cron: '0 14 * * *'   # 11:00 Recife
    - cron: '0 19 * * *'   # 16:00 Recife
    - cron: '0 23 * * *'   # 20:00 Recife, depois do atualiza-relatorios

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: "America/Recife"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extrair segmentos e topline dos PDFs
        run: |
          set +e

          python pesquisas.py extrair
          STATUS_EXTRAIR=$?

          python pesquisas.py topline
          STATUS_TOPLINE=$?

          if [ "$STATUS_EXTRAIR" -ne 0 ] || [ "$STATUS_TOPLINE" -ne 0 ]; then
            echo "Falha em extrair=$STATUS_EXTRAIR topline=$STATUS_TOPLINE"
            exit 1
          fi

      # Publicação nas planilhas de turno desativada por enquanto.
      # Quando quiser ligar, reative este passo (e os secrets abaixo no env):
      #   SPREADSHEET_ID_POLLINGDATA / SPREADSHEET_ID_POLLINGDATA_T2
      # - name: Publicar nas planilhas de turno (t1/t2 + média)
      #   run: |
      #     python pesquisas.py publicar
