name: polling-pdf-extrair-topline

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Recife = UTC-3. 3 rodadas: pega o que foi marcado como
    # conferido a qualquer hora do dia. Minuto fora do :00 pra reduzir o atraso de
    # enfileiramento do GitHub.
    - cron: '17 14 * * *'   # 11:17 Recife
    - cron: '17 19 * * *'   # 16:17 Recife
    - cron: '17 23 * * *'   # 20:17 Recife

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 220

    env:
      TZ: "America/Recife"
      PYTHONUNBUFFERED: "1"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico da rodada
        run: |
          date
          python --version
          echo "Workflow: polling-pdf-extrair-topline"
          echo "Comandos: pesquisas.py extrair; pesquisas.py topline"
          echo "Publicação PollingData: DESATIVADA"

      - name: Extrair segmentos, rejeição e aprovação
        id: extrair
        continue-on-error: true
        timeout-minutes: 110
        run: |
          set +e
          echo "::group::python pesquisas.py extrair"
          python -u pesquisas.py extrair
          status=$?
          echo "::endgroup::"
          exit "$status"

      - name: Extrair topline
        id: topline
        continue-on-error: true
        timeout-minutes: 110
        run: |
          set +e
          echo "::group::python pesquisas.py topline"
          python -u pesquisas.py topline
          status=$?
          echo "::endgroup::"
          exit "$status"

      - name: Resultado final
        if: ${{ always() }}
        run: |
          echo "extrair: ${{ steps.extrair.outcome }}"
          echo "topline: ${{ steps.topline.outcome }}"
          if [ "${{ steps.extrair.outcome }}" != "success" ] || [ "${{ steps.topline.outcome }}" != "success" ]; then
            exit 1
          fi
