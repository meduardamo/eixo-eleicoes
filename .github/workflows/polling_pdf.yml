name: polling-pdf-topline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'   # 12:00 BRT
    - cron: '0 23 * * *'   # 20:00 BRT

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: "America/Recife"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}
      SPREADSHEET_ID_POLLINGDATA: ${{ secrets.SPREADSHEET_ID_POLLINGDATA }}
      SPREADSHEET_ID_POLLINGDATA_T2: ${{ secrets.SPREADSHEET_ID_POLLINGDATA_T2 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extrair topline dos PDFs (staging)
        run: |
          python pesquisas.py topline

      - name: Publicar nas planilhas de turno (t1/t2 + média)
        run: |
          python pesquisas.py publicar
