name: polling-pdf-extrair-topline

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Recife = UTC-3.
    - cron: '0 14 * * *'   # 11:00 Recife
    - cron: '0 19 * * *'   # 16:00 Recife
    - cron: '0 23 * * *'   # 20:00 Recife, depois do atualiza-relatorios

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    env:
      TZ: "America/Recife"
      PYTHONUNBUFFERED: "1"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico da rodada
        run: |
          date
          python --version
          echo "Workflow: polling-pdf-extrair-topline"
          echo "Comandos: pesquisas.py extrair; pesquisas.py topline"

      - name: Extrair segmentos, rejeição e aprovação
        id: extrair
        continue-on-error: true
        timeout-minutes: 45
        run: |
          set +e
          echo "::group::python pesquisas.py extrair"
          python -u pesquisas.py extrair
          status=$?
          echo "::endgroup::"
          exit "$status"

      - name: Extrair topline
        id: topline
        continue-on-error: true
        timeout-minutes: 45
        run: |
          set +e
          echo "::group::python pesquisas.py topline"
          python -u pesquisas.py topline
          status=$?
          echo "::endgroup::"
          exit "$status"

      - name: Resultado final
        if: ${{ always() }}
        run: |
          echo "extrair: ${{ steps.extrair.outcome }}"
          echo "topline: ${{ steps.topline.outcome }}"
          if [ "${{ steps.extrair.outcome }}" != "success" ] || [ "${{ steps.topline.outcome }}" != "success" ]; then
            exit 1
          fi

      # Publicação nas planilhas de turno desativada por enquanto.
      # Quando quiser ligar, reative este passo (e os secrets abaixo no env):
      #   SPREADSHEET_ID_POLLINGDATA / SPREADSHEET_ID_POLLINGDATA_T2
      # - name: Publicar nas planilhas de turno (t1/t2 + média)
      #   run: |
      #     python pesquisas.py publicar
