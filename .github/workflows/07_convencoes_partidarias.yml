name: 07 - Convenções partidárias

on:
  workflow_dispatch:
    inputs:
      max_linhas:
        description: "Máximo de linhas a buscar nesta rodada"
        required: false
        default: "80"
      force:
        description: "Reconsultar e sobrescrever campos já preenchidos"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Tarde: pega anúncios publicados depois da manhã.
    - cron: '40 19 * * *'  # 16:40 Recife

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      TZ: "America/Recife"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID_CONVENCOES: ${{ secrets.SPREADSHEET_ID_CONVENCOES }}
      CONVENCOES_ABA: ${{ vars.CONVENCOES_ABA || 'Convenções partidárias' }}
      CONVENCOES_MAX_LINHAS: ${{ github.event.inputs.max_linhas || '80' }}
      CONVENCOES_FORCE: ${{ github.event.inputs.force || 'false' }}

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico da rodada
        run: |
          date
          python --version
          echo "Workflow: convencoes-partidarias"
          echo "Aba: $CONVENCOES_ABA"
          echo "Máximo de linhas: $CONVENCOES_MAX_LINHAS"
          echo "Force: $CONVENCOES_FORCE"

      - name: Buscar convenções
        run: |
          ARGS=(--max-linhas "$CONVENCOES_MAX_LINHAS")
          if [ "$CONVENCOES_FORCE" = "true" ]; then
            ARGS+=(--force)
          fi
          python -u convencoes_partidarias.py "${ARGS[@]}"
