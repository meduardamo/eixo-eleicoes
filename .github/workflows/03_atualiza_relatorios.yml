name: 03 - Atualiza relatórios

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Brasil/Recife = UTC-3.
    - cron: '13 11 * * *'   # 08:00 Brasil
    - cron: '53 0 * * *'    # 22:00 Brasil

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    env:
      PYTHONUNBUFFERED: "1"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Exportar Chrome
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Remover chromedriver incompatível do runner
        run: |
          sudo rm -f /usr/bin/chromedriver
          which chromedriver || true

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico da rodada
        run: |
          date
          python --version
          echo "Workflow: atualiza-relatorios"

      - name: Executar busca e upload
        run: python -u -m relatorios.relatorios_busca_fontes
