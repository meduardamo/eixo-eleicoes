name: 03 - Atualiza relatórios

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Recife = UTC-3. Duas rodadas por dia: uma no início
    # da tarde (pega os PDFs que saíram de manhã, prontos pra conferência) e uma no
    # fim da tarde (pega os que os institutos publicaram mais tarde). Minuto fora do
    # :00 pra reduzir o atraso de enfileiramento do GitHub.
    - cron: '17 16 * * *'   # 13:17 Recife
    - cron: '17 21 * * *'   # 18:17 Recife

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PYTHONUNBUFFERED: "1"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Exportar Chrome
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Remover chromedriver incompatível do runner
        run: |
          sudo rm -f /usr/bin/chromedriver
          which chromedriver || true

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico da rodada
        run: |
          date
          python --version
          echo "Workflow: atualiza-relatorios"

      - name: Executar busca e upload
        run: python -u relatorios_busca_fontes.py
