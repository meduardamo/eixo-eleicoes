name: 11 - PollingData API

on:
  schedule:
    # Uma vez por dia, de manhã. Cron do Actions atrasa (25 a 250 min medidos
    # neste repo), então 07:27 é alvo, não garantia. Aqui não tem prazo duro:
    # ninguém consome esse dado numa janela fixa como o DOU ou as notícias.
    - cron: '27 10 * * *'   # 07:27 BRT

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Só mostrar o que viria, sem gravar"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      so_uf:
        description: "Coletar uma UF só (ex.: PE). Vazio = todas."
        required: false
        default: ""

concurrency:
  group: pollingdata-api
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      TZ: "America/Recife"
      POLLINGDATA_TOKEN: ${{ secrets.POLLINGDATA_TOKEN }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      SPREADSHEET_ID_POLLING_API: ${{ secrets.SPREADSHEET_ID_POLLING_API }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Coletar
        run: |
          ARGS=()
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          [ -n "${{ github.event.inputs.so_uf }}" ] && ARGS+=(--so-uf "${{ github.event.inputs.so_uf }}")
          python -u -m outros.pollingdata_api "${ARGS[@]}"
