name: 06 - Notícias eleições

on:
  schedule:
    # GitHub Actions usa UTC; Brasil/Recife = UTC-3. Minuto fora do :00 porque
    # o :00 é quando o GitHub Actions mais enfileira e atrasa a rodada agendada.
    #
    # Duas horas antes do horário-alvo, de propósito: cron agendado do Actions
    # é fila de baixa prioridade e não começa na hora marcada. Medido em 12 dias
    # deste workflow: atraso de 25 min no melhor caso, 89 na mediana, 250 no
    # pior. O scraper ainda leva de 16 a 77 min. A antecipação cobre o caso
    # mediano; no dia de fila cheia continua atrasando, e a solução definitiva
    # é disparar por repository_dispatch a partir de um agendador externo.
    - cron: '15 7 * * *'   # 04:15 BRT, alvo 06:15
    - cron: '15 12 * * *'  # 09:15 BRT, alvo 11:15
    - cron: '15 16 * * *'  # 13:15 BRT, alvo 15:15
  # Disparo externo, em horario exato. O cron agendado do Actions entra numa
  # fila de baixa prioridade e atrasa de 25 a 250 min (medido em 12 dias), o que
  # nao serve pro time, que levanta noticia as 7h, 12h e 16h. Um agendador de
  # fora chama POST /repos/meduardamo/eixo-eleicoes/dispatches com
  # {"event_type": "raspar-noticias"} e o run comeca em segundos.
  # Os crons acima ficam como rede de seguranca: o scraper deduplica por titulo
  # contra a planilha, entao rodar duas vezes nao duplica noticia.
  repository_dispatch:
    types: [raspar-noticias]

  workflow_dispatch:        # permite rodar manualmente pelo GitHub

# Uma rodada por vez. Sao 6 gatilhos por dia (3 crons de rede de seguranca +
# 3 disparos externos) e o cron atrasa ate 250 min, entao duas rodadas podem se
# sobrepor. Se isso acontecer as duas leem carregar_titulos_existentes() antes
# de qualquer uma gravar, e as duas inserem as mesmas noticias: a deduplicacao
# por titulo nao protege contra execucao simultanea. Com cancel-in-progress
# false a segunda espera a primeira terminar e ai le a planilha ja atualizada.
concurrency:
  group: noticias-eleicoes
  cancel-in-progress: false

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests google-genai gspread google-auth "newspaper3k==0.2.8" "lxml[html_clean]==5.2.2" googlenewsdecoder

      - name: Rodar scraper
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID_TSE: ${{ secrets.SPREADSHEET_ID_TSE }}
          SPREADSHEET_ID_SITES: ${{ secrets.SPREADSHEET_ID_SITES }}
        run: python -u -m outros.noticias_eleicoes_scraper
