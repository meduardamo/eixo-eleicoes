name: 06 - Notícias eleições

on:
  schedule:
    # Uma rodada após a extração matinal, para limitar chamadas ao Gemini.
    - cron: '15 15 * * *'  # 12:15 BRT (UTC-3)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests google-genai gspread google-auth "newspaper3k==0.2.8" "lxml[html_clean]==5.2.2" googlenewsdecoder

      - name: Rodar scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID_TSE: ${{ secrets.SPREADSHEET_ID_TSE }}
          SPREADSHEET_ID_SITES: ${{ secrets.SPREADSHEET_ID_SITES }}
        run: python noticias_eleicoes_scraper.py
