name: 11 - Publica toplines liberadas

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; executa no minuto 07 de cada hora para não disputar
    # capacidade com rotinas agendadas no horário cheio. Não usa Gemini.
    - cron: '7 * * * *'

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: "America/Recife"
      PYTHONUNBUFFERED: "1"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}
      SPREADSHEET_ID_POLLINGDATA: ${{ secrets.SPREADSHEET_ID_POLLINGDATA }}
      SPREADSHEET_ID_POLLINGDATA_T2: ${{ secrets.SPREADSHEET_ID_POLLINGDATA_T2 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publicar somente toplines liberadas
        run: python -u relatorios_pipeline.py publicar
