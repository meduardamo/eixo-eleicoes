name: atualiza-relatorios

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; Recife = UTC-3.
    - cron: '0 21 * * *'   # 18:00 Recife, antes da rodada das 20:00

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Exportar Chrome
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Remover chromedriver incompatível do runner
        run: |
          sudo rm -f /usr/bin/chromedriver
          which chromedriver || true

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar busca e upload
        run: python atualiza_relatorios.py
