name: alerta-pesquisas

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT (UTC-3)
  workflow_dispatch:

jobs:
  alerta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install gspread google-auth brevo-python==1.1.2
      - run: python pesquisas.py alerta
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          DESTINATARIOS: ${{ secrets.DESTINATARIOS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}
