name: pollingdata-t1

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions roda em UTC.
    # Horários em Recife (UTC-3): 07:30, 14:47 e 23:12.
    - cron: "30 10 * * *"   # 07:30 BRT — antecipado para garantir atualização até 09h
    - cron: "47 17 * * *"   # 14:47 BRT
    - cron: "12 2 * * *"    # 23:12 BRT

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TZ: "America/Recife"
      INCLUIR_GOVERNADOR: "true"
      INCLUIR_SENADO: "true"
      INCLUIR_PRESIDENTE: "true"
      INCLUIR_PRESIDENTE_T2: "false"
      SPREADSHEET_ID_POLLINGDATA: ${{ secrets.SPREADSHEET_ID_POLLINGDATA }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper_polling.py
