name: pollingdata-daily

on:
  workflow_dispatch:
  schedule:
    # Horários sorteados diariamente (UTC). GitHub roda em UTC.
    # Recife (UTC-3): subtrai 3h (ex.: 03:17 UTC = 00:17 Recife).
    - cron: "17 3 * * *"
    - cron: "41 8 * * *"
    - cron: "09 14 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: "America/Recife"

      # flags do scraper_polling.py (env-driven)
      INCLUIR_GOVERNADOR: "true"
      INCLUIR_SENADO: "false"
      INCLUIR_PRESIDENTE: "false"

      # secrets
      SPREADSHEET_ID_POLLING: ${{ secrets.SPREADSHEET_ID_POLLING }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper_polling.py
