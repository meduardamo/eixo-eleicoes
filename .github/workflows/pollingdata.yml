name: pollingdata-daily

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions roda em UTC.
    # Horários em Recife (UTC-3): 08:23, 14:47 e 20:12.
    - cron: "23 11 * * *"
    - cron: "47 17 * * *"
    - cron: "12 23 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: "America/Recife"

      INCLUIR_GOVERNADOR: "true"
      INCLUIR_SENADO: "false"
      INCLUIR_PRESIDENTE: "false"

      SPREADSHEET_ID_POLLING: ${{ secrets.SPREADSHEET_ID_POLLING }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper_polling.py
