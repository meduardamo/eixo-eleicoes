name: 02 - Alerta pesquisas

on:
  schedule:
    # GitHub usa UTC; Recife = UTC-3. Minuto fora do :00 porque o :00 é quando o
    # GitHub Actions mais enfileira e atrasa a rodada agendada.
    - cron: '17 7 * * *'   # 04:17 BRT
  workflow_dispatch:

jobs:
  alerta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install gspread google-auth brevo-python==1.1.2
      - run: python -m relatorios.relatorios_extracao_segmentos alerta
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          DESTINATARIOS: ${{ secrets.DESTINATARIOS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SPREADSHEET_ID_RELATORIOS: ${{ secrets.SPREADSHEET_ID_RELATORIOS }}
          PASTA_RELATORIOS_URL: ${{ secrets.PASTA_RELATORIOS_URL }}
